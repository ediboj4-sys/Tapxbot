<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tap & Earn X - Home</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background: linear-gradient(135deg, #0a4d2c 0%, #1a7a4d 50%, #0d3a24 100%);
  background-image: 
    url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/></filter></defs><path d="M0,600 Q300,550 600,580 T1200,600 L1200,800 L0,800 Z" fill="%23073d1f" opacity="0.4"/><ellipse cx="150" cy="400" rx="80" ry="200" fill="%23155e3b" opacity="0.3" filter="url(%23shadow)"/><ellipse cx="1050" cy="450" rx="100" ry="220" fill="%231a7a4d" opacity="0.25" filter="url(%23shadow)"/><path d="M50,300 Q100,200 150,300" stroke="%23228B4C" stroke-width="8" fill="none" opacity="0.4" filter="url(%23shadow)"/><path d="M1100,250 Q1150,180 1180,260" stroke="%232BAA6F" stroke-width="6" fill="none" opacity="0.4" filter="url(%23shadow)"/></svg>'),
    radial-gradient(ellipse at 20% 80%, rgba(34, 139, 76, 0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(26, 122, 77, 0.2) 0%, transparent 50%);
  background-size: cover, 100% 100%, 100% 100%;
  background-attachment: fixed;
  color:white;
  font-family:Arial, sans-serif;
  padding:18px;
  min-height:100vh;
}

.container {
  max-width: 600px;
  margin: 0 auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#00e0ff;
  text-shadow: 0 0 10px rgba(0, 224, 255, 0.5);
}

.level{
  background:#132033;
  padding:8px 14px;
  border-radius:30px;
  font-size:14px;
}

.balance-box{
  background:linear-gradient(135deg,#00e0ff,#0077ff);
  border-radius:24px;
  padding:30px 20px;
  text-align:center;
  color:#fff;
  margin-bottom:20px;
  box-shadow: 0 8px 20px rgba(0, 224, 255, 0.3);
}

.balance-box h2{
  font-size:50px;
  margin-top:10px;
}

.progress{
  width:100%;
  height:10px;
  background:rgba(255,255,255,0.2);
  border-radius:30px;
  overflow:hidden;
  margin-top:15px;
}

.progress div{
  width:0%;
  height:100%;
  background:#fff;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:20px;
}

.card{
  background:#101b2d;
  padding:18px;
  border-radius:20px;
  border:1px solid #1f2d44;
}

.card h3{
  font-size:16px;
  margin-bottom:10px;
}

.card p{
  font-size:13px;
  opacity:0.8;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:14px;
  background:linear-gradient(45deg,#00e0ff,#0077ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition: all 0.2s;
}

.btn:active{
  transform:scale(0.96);
}

.btn:hover {
  box-shadow: 0 0 20px rgba(0, 224, 255, 0.5);
}

.section{
  background:#101b2d;
  padding:18px;
  border-radius:20px;
  margin-bottom:18px;
  border:1px solid #1f2d44;
}

.section h2 {
  margin-bottom: 15px;
  font-size: 18px;
}

input,select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#18263b;
  color:white;
  margin-top:10px;
}

/* LION TAP CONTAINER */
.lion-tap-container{
  text-align: center;
  margin: 30px 0;
  perspective: 1000px;
}

.lion-head{
  width: 250px;
  height: 250px;
  margin: 0 auto;
  cursor: pointer;
  transition: transform 0.1s;
  filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.5));
}

.lion-head:active{
  transform: scale(0.95);
}

/* DAILY PROGRESS BAR */
#dailyProgressBar{
  width:100%;
  height:8px;
  background:#1b2a40;
  border-radius:20px;
  overflow:hidden;
  margin-top:10px;
}

#dailyProgressBar div{
  height:100%;
  width:0%;
  background:#00e0ff;
}

/* JOIN POPUP */
#joinPopup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  text-align:center;
}
#joinPopup button{
  padding:14px 20px;
  border:none;
  border-radius:12px;
  background:#00e0ff;
  color:#000;
  font-weight:bold;
}

.floating-text {
  position: fixed;
  pointer-events: none;
  font-weight: bold;
  font-size: 24px;
  color: #00e0ff;
  text-shadow: 0 0 10px rgba(0, 224, 255, 0.8);
  z-index: 1000;
}

.nav-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 10px;
  margin-top: 20px;
  padding-bottom: 20px;
}

.nav-btn {
  padding: 10px;
  border: none;
  border-radius: 12px;
  background: #101b2d;
  color: #00e0ff;
  border: 1px solid #1f2d44;
  cursor: pointer;
  font-size: 12px;
  font-weight: bold;
  transition: all 0.2s;
}

.nav-btn:active {
  background: #00e0ff;
  color: #000;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <div class="logo">⚡ Tap & Earn X</div>
    <div class="level">Level <span id="level">1</span></div>
  </div>

  <div class="balance-box">
    <p>Total XP</p>
    <h2 id="points">0</h2>

    <div class="progress">
      <div id="bar"></div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h3>👆 Total Taps</h3>
      <p id="taps">0</p>
    </div>

    <div class="card">
      <h3>🏆 Rank</h3>
      <p id="rank">Starter</p>
    </div>
  </div>

  <!-- LION TAP SECTION -->
  <div class="section">
    <h2>🎮 Tap The Lion</h2>
    <div class="lion-tap-container">
      <svg id="tapBtn" class="lion-head" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Lion Head with Mane -->
        <defs>
          <radialGradient id="lionGrad" cx="40%" cy="40%">
            <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8B6F47;stop-opacity:1" />
          </radialGradient>
          <filter id="shadow">
            <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.4"/>
          </filter>
        </defs>
        
        <!-- Outer Mane Circle -->
        <circle cx="100" cy="100" r="95" fill="#C19A6B" filter="url(#shadow)"/>
        <circle cx="100" cy="100" r="88" fill="#D2B48C"/>
        
        <!-- Mane Details -->
        <path d="M 50 60 Q 40 50 35 65 Q 30 80 45 90" fill="#9B8860" opacity="0.6"/>
        <path d="M 150 60 Q 160 50 165 65 Q 170 80 155 90" fill="#9B8860" opacity="0.6"/>
        <path d="M 30 100 Q 20 95 15 110 Q 20 125 35 120" fill="#9B8860" opacity="0.6"/>
        <path d="M 170 100 Q 180 95 185 110 Q 180 125 165 120" fill="#9B8860" opacity="0.6"/>
        
        <!-- Head -->
        <circle cx="100" cy="105" r="60" fill="url(#lionGrad)" filter="url(#shadow)"/>
        
        <!-- Face Color -->
        <ellipse cx="100" cy="110" rx="50" ry="52" fill="#D4A574"/>
        
        <!-- Snout/Nose Area -->
        <ellipse cx="100" cy="125" rx="35" ry="28" fill="#C9A96E"/>
        <ellipse cx="100" cy="130" rx="25" ry="18" fill="#E8D5C4"/>
        
        <!-- Nose -->
        <ellipse cx="100" cy="128" rx="8" ry="7" fill="#3D3D3D"/>
        <ellipse cx="97" cy="127" rx="2" ry="2" fill="#000"/>
        
        <!-- Mouth -->
        <path d="M 100 128 Q 95 135 88 133" stroke="#3D3D3D" stroke-width="1.5" fill="none"/>
        <path d="M 100 128 Q 105 135 112 133" stroke="#3D3D3D" stroke-width="1.5" fill="none"/>
        
        <!-- Eyes -->
        <circle cx="85" cy="95" r="6" fill="#FFF"/>
        <circle cx="85" cy="95" r="4" fill="#FFD700"/>
        <circle cx="83" cy="93" r="2.5" fill="#000"/>
        <circle cx="84" cy="92" r="1" fill="#FFF" opacity="0.6"/>
        
        <circle cx="115" cy="95" r="6" fill="#FFF"/>
        <circle cx="115" cy="95" r="4" fill="#FFD700"/>
        <circle cx="117" cy="93" r="2.5" fill="#000"/>
        <circle cx="116" cy="92" r="1" fill="#FFF" opacity="0.6"/>
        
        <!-- Eyebrows -->
        <path d="M 78 88 Q 85 85 92 87" stroke="#8B6F47" stroke-width="1.5" fill="none"/>
        <path d="M 108 87 Q 115 85 122 88" stroke="#8B6F47" stroke-width="1.5" fill="none"/>
        
        <!-- Ears -->
        <ellipse cx="65" cy="70" rx="12" ry="18" fill="#C19A6B"/>
        <ellipse cx="65" cy="73" rx="6" ry="10" fill="#E8D5C4"/>
        
        <ellipse cx="135" cy="70" rx="12" ry="18" fill="#C19A6B"/>
        <ellipse cx="135" cy="73" rx="6" ry="10" fill="#E8D5C4"/>
        
        <!-- Whiskers -->
        <line x1="50" y1="105" x2="30" y2="100" stroke="#9B8860" stroke-width="1.5"/>
        <line x1="50" y1="115" x2="30" y2="125" stroke="#9B8860" stroke-width="1.5"/>
        <line x1="150" y1="105" x2="170" y2="100" stroke="#9B8860" stroke-width="1.5"/>
        <line x1="150" y1="115" x2="170" y2="125" stroke="#9B8860" stroke-width="1.5"/>
        
        <!-- Golden Ornament Ring -->
        <circle cx="100" cy="100" r="65" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.7"/>
        <circle cx="100" cy="100" r="60" fill="none" stroke="#FFA500" stroke-width="1" opacity="0.5"/>
      </svg>
    </div>
    <p style="text-align:center; margin-top:15px; font-size:14px; opacity:0.8;">Tap the lion to earn XP!</p>
  </div>

  <div class="section">
    <h2>📺 Reward Ad</h2>
    <button class="btn" id="rewardBtn">Watch Ad +10 XP</button>
  </div>

  <div class="section">
    <h2>🎯 Task Center</h2>
    <button class="btn" id="taskBtn">Complete Task +10 XP</button>
  </div>

  <div class="section">
    <h2>🎁 Daily Reward</h2>
    <button class="btn" id="dailyBtn">Start Daily Bonus</button>

    <div id="dailyProgressBar">
      <div></div>
    </div>
  </div>

  <div class="section">
    <h2>👥 Referral</h2>
    <input id="refInput" readonly value="https://t.me/@TapXBot?start=12345">
    <button class="btn" id="copyBtn">Copy Referral Link</button>
  </div>

  <div class="section">
    <h2>💳 Withdraw</h2>

    <select id="method">
      <option>USDT</option>
      <option>Litecoin</option>
      <option>Payeer</option>
      <option>Bank</option>
    </select>

    <input id="wallet" placeholder="Wallet Address">
    <input id="amount" type="number" placeholder="Amount">

    <button class="btn" id="withdrawBtn">Withdraw XP</button>
  </div>

  <!-- Navigation Buttons -->
  <div class="nav-buttons">
    <button class="nav-btn" onclick="location.href='index.html'">🏠 Explore</button>
    <button class="nav-btn" onclick="location.href='missions.html'">🎯 Missions</button>
    <button class="nav-btn" onclick="location.href='bounty.html'">🏆 Bounty</button>
    <button class="nav-btn" onclick="location.href='wallet.html'">💰 Wallet</button>
  </div>
</div>

<!-- JOIN POPUP -->
<div id="joinPopup">
  <h2 style="margin-bottom:15px;">Join Our Channel</h2>
  <button id="joinBtn">Join Channel +5 XP</button>
</div>

<script>
const tg = window.Telegram?.WebApp;
tg?.expand?.();

let xp = parseInt(localStorage.getItem('xp') || '0');
let taps = parseInt(localStorage.getItem('taps') || '0');
let lastDaily = parseInt(localStorage.getItem('daily') || '0');
let dailyProgress = parseInt(localStorage.getItem('dailyProgress') || 0);

const DAILY_BLOCKS = ["task-29806","task-29807","task-29808","task-29809"];

function updateDailyBar(){
  let percent = (dailyProgress / 4) * 100;
  document.querySelector("#dailyProgressBar div").style.width = percent + "%";
}

function getRank() {
  if (xp < 500) return "Starter";
  if (xp < 1000) return "Novice";
  if (xp < 2000) return "Elite";
  if (xp < 5000) return "Champion";
  return "Legend";
}

function update(){
  document.getElementById('points').innerText = xp;
  document.getElementById('taps').innerText = taps;
  document.getElementById('rank').innerText = getRank();

  let level = Math.floor(xp / 500) + 1;
  document.getElementById('level').innerText = level;

  let progress = (xp % 500) / 500 * 100;
  document.getElementById('bar').style.width = progress + '%';

  localStorage.setItem('xp', xp);
  localStorage.setItem('taps', taps);
  localStorage.setItem('dailyProgress', dailyProgress);

  updateDailyBar();
}

update();

let rewardAd, taskAd;

window.onload = () => {
  if(typeof Adsgram !== 'undefined'){
    rewardAd = Adsgram.init({ blockId:'29779' });
    taskAd = Adsgram.init({ blockId:'29780' });

    let joinAd = Adsgram.init({ blockId:'35248' });
    joinAd.show().finally(() => {
      document.getElementById("joinPopup").style.display = "flex";
    });
  }
};

document.getElementById('tapBtn').onclick = function(e) {
  xp += 1;
  taps += 1;
  
  // Floating text animation
  const floatingText = document.createElement('div');
  floatingText.className = 'floating-text';
  floatingText.innerText = '+1 XP';
  floatingText.style.left = e.pageX + 'px';
  floatingText.style.top = e.pageY + 'px';
  document.body.appendChild(floatingText);
  
  setTimeout(() => {
    floatingText.style.opacity = '0';
    floatingText.style.transform = 'translateY(-50px)';
    floatingText.style.transition = 'all 0.5s ease-out';
  }, 100);
  
  setTimeout(() => floatingText.remove(), 600);
  
  update();
};

document.getElementById('rewardBtn').onclick = async () => {
  if(!rewardAd) return alert('Ad not ready');
  try{
    const res = await rewardAd.show();
    if(res?.done){ xp += 10; update(); alert('Reward Added'); }
  }catch(e){}
};

document.getElementById('taskBtn').onclick = async () => {
  if(!taskAd) return alert('Task ad not ready');
  try{
    const res = await taskAd.show();
    if(res?.done){ xp += 10; update(); alert('Task Completed'); }
  }catch(e){}
};

/* DAILY SYSTEM */
document.getElementById('dailyBtn').onclick = async () => {
  let now = Date.now();

  if(now - lastDaily < 86400000 && dailyProgress === 4){
    return alert('Come back tomorrow');
  }

  if(dailyProgress >= 4){
    return alert('Already completed today');
  }

  if(typeof Adsgram === 'undefined') return alert('Ads not ready');

  let block = DAILY_BLOCKS[dailyProgress];

  let task = document.createElement("adsgram-task");
  task.setAttribute("data-block-id", block);

  document.getElementById('dailyBtn').parentNode.appendChild(task);

  task.addEventListener("reward", () => {
    dailyProgress++;
    task.remove();

    if(dailyProgress === 4){
      xp += 900;
      lastDaily = now;
      dailyProgress = 0;
      localStorage.setItem('daily', now);
      alert("🎉 Daily bonus completed! +900 XP");
    } else {
      alert("Step " + dailyProgress + " completed!");
    }

    update();
  });

  if(typeof task.load === "function") task.load();
};

document.getElementById('joinBtn').onclick = () => {
  xp += 5;
  update();
  document.getElementById("joinPopup").style.display = "none";
  window.open("https://t.me/TapXBotOfficial","_blank");
};

document.getElementById('copyBtn').onclick = () => {
  let input = document.getElementById('refInput');
  input.select();
  document.execCommand('copy');
  alert('Referral link copied!');
};

document.getElementById('withdrawBtn').onclick = () => {
  let amount = parseInt(document.getElementById('amount').value);
  if(!amount || amount < 10000) return alert('Minimum 10,000 XP');
  if(xp < amount) return alert('Not enough XP');
  xp -= amount;
  update();
  alert('Withdraw Sent');
};
</script>

</body>
</html>
