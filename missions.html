<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Missions - Tap & Earn X</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background: linear-gradient(135deg, #0a4d2c 0%, #1a7a4d 50%, #0d3a24 100%);
  background-attachment: fixed;
  color:white;
  font-family:Arial, sans-serif;
  padding:18px;
  min-height:100vh;
}

.container {
  max-width: 600px;
  margin: 0 auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#00e0ff;
  text-shadow: 0 0 10px rgba(0, 224, 255, 0.5);
}

.section{
  background:#101b2d;
  padding:18px;
  border-radius:20px;
  margin-bottom:18px;
  border:1px solid #1f2d44;
}

.mission-card {
  background: linear-gradient(135deg, #1a2d45 0%, #0f1f35 100%);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 12px;
  border: 1px solid #2a3d55;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.mission-info h3 {
  font-size: 16px;
  margin-bottom: 5px;
}

.mission-info p {
  font-size: 13px;
  opacity: 0.7;
}

.mission-reward {
  background: linear-gradient(45deg, #00e0ff, #0077ff);
  padding: 8px 14px;
  border-radius: 10px;
  font-weight: bold;
  text-align: center;
  min-width: 80px;
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(45deg, #00e0ff, #0077ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 10px;
}

.btn:active {
  transform: scale(0.96);
}

.progress-section {
  background: #0f1f35;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: #1b2a40;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 8px;
}

.progress-bar div {
  height: 100%;
  background: #00e0ff;
  width: 0%;
  transition: width 0.3s;
}

.nav-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 10px;
  margin-top: 20px;
  padding-bottom: 20px;
}

.nav-btn {
  padding: 10px;
  border: none;
  border-radius: 12px;
  background: #101b2d;
  color: #00e0ff;
  border: 1px solid #1f2d44;
  cursor: pointer;
  font-size: 12px;
  font-weight: bold;
  transition: all 0.2s;
}

.nav-btn:active {
  background: #00e0ff;
  color: #000;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <div class="logo">⚡ Missions</div>
    <a href="index.html" style="color: #00e0ff; text-decoration: none; font-size: 18px;">←</a>
  </div>

  <div class="section">
    <h2>🎯 Daily Missions</h2>
    
    <div class="mission-card">
      <div class="mission-info">
        <h3>Visit Twitter</h3>
        <p>Follow us on Twitter</p>
      </div>
      <div class="mission-reward">+50 XP</div>
    </div>

    <div class="mission-card">
      <div class="mission-info">
        <h3>Share on Telegram</h3>
        <p>Share to 5 chats</p>
      </div>
      <div class="mission-reward">+100 XP</div>
    </div>

    <div class="mission-card">
      <div class="mission-info">
        <h3>Invite 3 Friends</h3>
        <p>Get referral rewards</p>
      </div>
      <div class="mission-reward">+200 XP</div>
    </div>

    <button class="btn">View All Missions</button>
  </div>

  <div class="section">
    <h2>📊 Progress</h2>
    
    <div class="progress-section">
      <p>Weekly Challenges</p>
      <div class="progress-bar">
        <div style="width: 45%;"></div>
      </div>
      <p style="font-size: 12px; margin-top: 8px; opacity: 0.7;">45% Complete</p>
    </div>

    <div class="progress-section">
      <p>Total Missions Completed</p>
      <p style="font-size: 24px; font-weight: bold; margin-top: 8px;" id="completedMissions">0</p>
    </div>
  </div>

  <div class="nav-buttons">
    <button class="nav-btn" onclick="location.href='index.html'">🏠 Explore</button>
    <button class="nav-btn" onclick="location.href='missions.html'">🎯 Missions</button>
    <button class="nav-btn" onclick="location.href='bounty.html'">🏆 Bounty</button>
    <button class="nav-btn" onclick="location.href='wallet.html'">💰 Wallet</button>
  </div>
</div>

<script>
let completedMissions = parseInt(localStorage.getItem('completedMissions') || '0');
document.getElementById('completedMissions').innerText = completedMissions;
</script>

</body>
</html>
